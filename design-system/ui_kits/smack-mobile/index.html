<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>Smack — Mobile UI Kit</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="stylesheet" href="../../colors_and_type.css">
  <style>
    html, body {
      margin: 0; padding: 0;
      background: radial-gradient(ellipse at center, #0c1024 0%, #04060c 70%);
      min-height: 100vh;
      font-family: var(--f-sans);
      color: var(--c-fg);
      overflow: hidden;
    }
    body { display: flex; align-items: center; justify-content: center; min-height: 100vh; }

    /* Ambient room glow */
    body::before {
      content: ""; position: fixed; inset: 0; pointer-events: none;
      background:
        radial-gradient(circle at 30% 20%, #2ee6d61a 0%, transparent 30%),
        radial-gradient(circle at 70% 80%, #a06bff1a 0%, transparent 30%);
    }

    @keyframes smack-pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50%      { opacity: 0.55; transform: scale(1.25); }
    }
    .smack-pulse-dot { animation: smack-pulse 1800ms ease-in-out infinite; transform-origin: center; }

    /* Hide scrollbars inside the device */
    .device-content::-webkit-scrollbar { width: 0; }

    /* iOS-frame override: status bar should be light over dark */
    /* (The frame component already supports `dark` — we pass dark=true) */

    .label {
      position: absolute; top: 16px; left: 20px;
      font-family: var(--f-sans); font-weight: 600; font-size: 13px;
      color: var(--c-fg-3); letter-spacing: 0.3px;
      display: flex; align-items: center; gap: 10px;
    }
    .label::before {
      content: ""; width: 8px; height: 8px; border-radius: 50%;
      background: #2ee6d6; box-shadow: 0 0 12px #2ee6d6cc;
    }
  </style>
</head>
<body>

<div class="label">Smack · Android preview · tap around</div>

<div id="root"></div>

<!-- React + Babel -->
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<!-- Android frame + kit modules. Load order matters: components/data → cards → screens → app → mount. -->
<script type="text/babel" src="android-frame.jsx"></script>
<script type="text/babel" src="icons.jsx"></script>
<script type="text/babel" src="components.jsx"></script>
<script type="text/babel" src="event-card.jsx"></script>
<script type="text/babel" src="mock-data.jsx"></script>
<script type="text/babel" src="screen-login.jsx"></script>
<script type="text/babel" src="screen-groups.jsx"></script>
<script type="text/babel" src="screen-group-detail.jsx"></script>
<script type="text/babel" src="screen-event-detail.jsx"></script>
<script type="text/babel" src="screen-calendar.jsx"></script>
<script type="text/babel" src="screen-profile.jsx"></script>
<script type="text/babel" src="screen-create-event.jsx"></script>
<script type="text/babel" src="app.jsx"></script>

<script type="text/babel">
  function Mount() {
    return (
      <AndroidDevice width={412} height={892} dark={true}>
        <div className="device-content"
             style={{ width: '100%', height: '100%', overflow: 'hidden',
                      background: '#080b14', display: 'flex', flexDirection: 'column' }}>
          <SmackApp />
        </div>
      </AndroidDevice>
    );
  }
  const root = ReactDOM.createRoot(document.getElementById('root'));
  root.render(<Mount />);
</script>

</body>
</html>
