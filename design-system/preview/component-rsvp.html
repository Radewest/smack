<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card" style="padding:18px 20px;">
  <div style="font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.5px; color: var(--c-fg-3); margin-bottom:10px;">Are you keen?</div>
  <div style="display:flex; flex-direction:column; gap:8px;">
    <div style="border:1px solid #1f5a3b; background:#0e2a1d; border-radius:12px; padding:14px; text-align:center;">
      <span style="color:#3ff09a; font-weight:600; font-size:15px;">I'm keen 🙋</span>
    </div>
    <div style="border:1px solid var(--c-shore); border-radius:12px; padding:14px; text-align:center;">
      <span style="color:var(--c-fg-3); font-weight:600; font-size:15px;">Maybe 🤔</span>
    </div>
    <div style="border:1px solid var(--c-shore); border-radius:12px; padding:14px; text-align:center;">
      <span style="color:var(--c-fg-3); font-weight:600; font-size:15px;">Can't make it 🙅</span>
    </div>
  </div>
  <div style="margin-top:10px; color: var(--c-fg-3); font-size:11px;">Active = status colour on text + 10% tint background + matched border. Three-channel selection.</div>
</div>
</body></html>
