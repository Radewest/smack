<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card" style="padding:24px;">
  <div style="display:flex; gap:20px; align-items:center;">
    <!-- App icon (rounded square) -->
    <div style="position:relative; width:128px; height:128px; border-radius:28px; overflow:hidden; box-shadow: 0 12px 32px #00000080, 0 0 0 1px #ffffff10 inset;">
      <img src="../assets/smack-app-icon.svg" style="width:100%; height:100%; display:block;">
    </div>
    <!-- Adaptive (Android circle clip) -->
    <div style="position:relative; width:128px; height:128px; border-radius:50%; overflow:hidden; box-shadow: 0 12px 32px #00000080, 0 0 0 1px #ffffff10 inset;">
      <img src="../assets/smack-app-icon.svg" style="width:100%; height:100%; display:block;">
    </div>
    <!-- Squircle (iOS shape) -->
    <div style="position:relative; width:128px; height:128px; border-radius:22%; overflow:hidden; box-shadow: 0 12px 32px #00000080, 0 0 0 1px #ffffff10 inset;">
      <img src="../assets/smack-app-icon.svg" style="width:100%; height:100%; display:block;">
    </div>
    <div style="flex:1; min-width:0; padding-left:8px;">
      <div style="font-size:13px; font-weight:700; color: var(--c-fg-2); margin-bottom:6px;">App icon — three masks</div>
      <div style="color: var(--c-fg-3); font-size:12px; line-height:1.5;">
        Deep ocean radial behind a centred jellyfish, with faint scattered glow dots — the festival, far away. Same source SVG renders correctly under every store mask.
      </div>
    </div>
  </div>
</div>
</body></html>
