<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card">
  <div style="display:flex; gap:20px; align-items:center; flex-wrap:wrap;">

    <div style="text-align:center;">
      <div style="width:88px; height:88px; background: var(--c-ink-2); border-radius:14px; border:1px solid var(--c-shore); box-shadow: 0 1px 0 #ffffff05 inset, 0 4px 18px #00000040;"></div>
      <div style="margin-top:8px; font-size:11px; font-weight:600; color:var(--c-fg-2);">Card</div>
      <div style="font-family:var(--f-mono); font-size:9px; color:var(--c-fg-3);">--sh-card</div>
    </div>

    <div style="text-align:center;">
      <div style="width:88px; height:88px; background: var(--c-ink-2); border-radius:14px; border:1px solid var(--c-shore); box-shadow: 0 8px 40px #00000080, 0 0 0 1px #ffffff08 inset;"></div>
      <div style="margin-top:8px; font-size:11px; font-weight:600; color:var(--c-fg-2);">Modal</div>
      <div style="font-family:var(--f-mono); font-size:9px; color:var(--c-fg-3);">--sh-modal</div>
    </div>

    <div style="text-align:center;">
      <div style="width:88px; height:88px; border-radius:50%; background:#2ee6d6; box-shadow: 0 4px 8px #2ee6d680, 0 0 24px #2ee6d655; display:flex; align-items:center; justify-content:center;">
        <svg width="32" height="32" viewBox="0 0 24 24" fill="none" stroke="#04060c" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </div>
      <div style="margin-top:8px; font-size:11px; font-weight:600; color:var(--c-glow-cyan);">FAB · lit</div>
      <div style="font-family:var(--f-mono); font-size:9px; color:var(--c-fg-3);">--sh-fab</div>
    </div>

    <div style="text-align:center;">
      <div style="width:88px; height:88px; display:flex; align-items:center; justify-content:center;">
        <div style="width:28px; height:28px; border-radius:50%; background:#3ff09a; box-shadow: 0 0 22px #3ff09a55, 0 0 5px #3ff09acc;"></div>
      </div>
      <div style="margin-top:8px; font-size:11px; font-weight:600; color:var(--c-status-live);">Glow · live</div>
      <div style="font-family:var(--f-mono); font-size:9px; color:var(--c-fg-3);">--sh-glow-live</div>
    </div>

    <div style="text-align:center;">
      <div style="width:88px; height:88px; display:flex; align-items:center; justify-content:center;">
        <div style="width:28px; height:28px; border-radius:50%; background:#ffb547; box-shadow: 0 0 22px #ffb54755, 0 0 5px #ffb547cc;"></div>
      </div>
      <div style="margin-top:8px; font-size:11px; font-weight:600; color:var(--c-glow-amber);">Glow · amber</div>
      <div style="font-family:var(--f-mono); font-size:9px; color:var(--c-fg-3);">--sh-glow-amber</div>
    </div>

  </div>
  <div style="margin-top:14px; color: var(--c-fg-3); font-size:11px; line-height:1.5;">
    Two kinds of depth: a quiet drop for cards & modals; a coloured glow for things that are <em>lit</em>. Never mix.
  </div>
</div>
</body></html>
