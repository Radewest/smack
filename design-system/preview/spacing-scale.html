<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card">
  <div style="display:flex; gap:14px; align-items:flex-end;">
    <div style="text-align:center;"><div style="width:4px; height:32px; background:var(--c-glow-cyan); border-radius:2px;"></div><div style="margin-top:6px; font-family:var(--f-mono); font-size:10px; color:var(--c-fg-3);">4</div><div style="font-size:10px; color:var(--c-fg-4);">--s-1</div></div>
    <div style="text-align:center;"><div style="width:8px; height:32px; background:var(--c-glow-cyan); border-radius:2px;"></div><div style="margin-top:6px; font-family:var(--f-mono); font-size:10px; color:var(--c-fg-3);">8</div><div style="font-size:10px; color:var(--c-fg-4);">--s-2</div></div>
    <div style="text-align:center;"><div style="width:10px; height:32px; background:var(--c-glow-cyan); border-radius:2px;"></div><div style="margin-top:6px; font-family:var(--f-mono); font-size:10px; color:var(--c-fg-3);">10</div><div style="font-size:10px; color:var(--c-fg-4);">--s-3</div></div>
    <div style="text-align:center;"><div style="width:12px; height:32px; background:var(--c-glow-cyan); border-radius:2px;"></div><div style="margin-top:6px; font-family:var(--f-mono); font-size:10px; color:var(--c-fg-3);">12</div><div style="font-size:10px; color:var(--c-fg-4);">--s-4</div></div>
    <div style="text-align:center;"><div style="width:14px; height:32px; background:var(--c-glow-cyan); border-radius:2px;"></div><div style="margin-top:6px; font-family:var(--f-mono); font-size:10px; color:var(--c-fg-3);">14</div><div style="font-size:10px; color:var(--c-fg-4);">--s-5</div></div>
    <div style="text-align:center;"><div style="width:16px; height:32px; background:var(--c-glow-cyan); border-radius:2px;"></div><div style="margin-top:6px; font-family:var(--f-mono); font-size:10px; color:var(--c-fg-3);">16</div><div style="font-size:10px; color:var(--c-fg-4);">--s-6</div></div>
    <div style="text-align:center;"><div style="width:20px; height:32px; background:var(--c-glow-cyan); border-radius:2px;"></div><div style="margin-top:6px; font-family:var(--f-mono); font-size:10px; color:var(--c-fg-3);">20</div><div style="font-size:10px; color:var(--c-fg-4);">--s-7</div></div>
    <div style="text-align:center;"><div style="width:24px; height:32px; background:var(--c-glow-cyan); border-radius:2px;"></div><div style="margin-top:6px; font-family:var(--f-mono); font-size:10px; color:var(--c-fg-3);">24</div><div style="font-size:10px; color:var(--c-fg-4);">--s-8</div></div>
    <div style="text-align:center;"><div style="width:32px; height:32px; background:var(--c-glow-cyan); border-radius:2px;"></div><div style="margin-top:6px; font-family:var(--f-mono); font-size:10px; color:var(--c-fg-3);">32</div><div style="font-size:10px; color:var(--c-fg-4);">--s-10</div></div>
    <div style="text-align:center;"><div style="width:48px; height:32px; background:var(--c-glow-cyan); border-radius:2px;"></div><div style="margin-top:6px; font-family:var(--f-mono); font-size:10px; color:var(--c-fg-3);">48</div><div style="font-size:10px; color:var(--c-fg-4);">--s-12</div></div>
  </div>
  <div style="margin-top:14px; color: var(--c-fg-3); font-size:11px;">4pt grid. Card padding <code style="font-family:var(--f-mono); color:var(--c-fg-2)">16</code>. Screen padding <code style="font-family:var(--f-mono); color:var(--c-fg-2)">20</code>.</div>
</div>
</body></html>
