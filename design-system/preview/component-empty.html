<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card" style="padding:24px 20px; text-align:center;">
  <div style="font-size:42px; margin-bottom:14px;">👥</div>
  <div style="color:var(--c-fg); font-size:18px; font-weight:800; margin-bottom:6px;">No groups yet</div>
  <div style="color:var(--c-fg-3); font-size:13px; line-height:1.5; max-width:320px; margin:0 auto 16px;">Create a group for your crew, or join one with an invite code.</div>
  <div style="display:inline-flex; flex-direction:column; gap:8px; width:80%; max-width:280px;">
    <div style="background:#2ee6d6; border-radius:12px; padding:13px; text-align:center; box-shadow: 0 4px 12px #2ee6d640;">
      <span style="color:#04060c; font-weight:700; font-size:14px;">Create a Group</span>
    </div>
    <div style="border:1px solid var(--c-shore); border-radius:12px; padding:13px; text-align:center;">
      <span style="color:var(--c-fg-3); font-size:14px;">Join with Code</span>
    </div>
  </div>
</div>
</body></html>
