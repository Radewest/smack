<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card" style="padding:18px 20px;">
  <!-- Proper event card -->
  <div style="background: var(--c-ink); border:1px solid var(--c-shore); border-radius:14px; padding:16px;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:6px;">
      <div style="color:var(--c-fg); font-weight:700; font-size:16px;">Saturday BBQ at mine</div>
      <div style="background:#0a1a2a; padding:3px 8px; border-radius:6px;"><span style="color:var(--c-fg-2); font-size:11px; font-weight:600;">📅 Today</span></div>
    </div>

    <div style="color:var(--c-fg-3); font-size:13px; margin-bottom:3px;">📍 <span style="text-decoration:underline; color:var(--c-fg-2);">42 Elder Road, E8</span></div>
    <div style="color:var(--c-fg-3); font-size:13px; margin-bottom:8px;">🕐 16:00</div>

    <div style="display:flex; flex-wrap:wrap; gap:8px;">
      <span style="color:var(--c-fg-3); font-size:12px;">🙋 Cara, Ben +3</span>
      <span style="color:var(--c-fg-3); font-size:12px;">🤔 1 maybe</span>
    </div>

    <div style="color:var(--c-fg-4); font-size:11px; margin-top:8px;">You</div>

    <!-- Attendance buttons row -->
    <div style="display:flex; flex-wrap:wrap; gap:6px; margin-top:10px;">
      <div style="border:1px solid #5a4019; background:#2a1f0a; border-radius:8px; padding:6px 10px;"><span style="color:#ffb547; font-size:12px; font-weight:600;">On the way 🚶</span></div>
      <div style="border:1px solid var(--c-shore); border-radius:8px; padding:6px 10px;"><span style="color:var(--c-fg-3); font-size:12px; font-weight:600;">I'm here 🟢</span></div>
      <div style="border:1px solid var(--c-shore); border-radius:8px; padding:6px 10px;"><span style="color:var(--c-fg-3); font-size:12px; font-weight:600;">Heading home 🌙</span></div>
    </div>
  </div>
</div>
</body></html>
