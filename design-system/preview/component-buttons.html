<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card" style="padding:18px 20px;">
  <div style="display:flex; flex-direction:column; gap:10px;">
    <!-- Primary -->
    <div style="background:#2ee6d6; box-shadow: 0 4px 12px #2ee6d640; border-radius:12px; padding:14px 16px; text-align:center;">
      <span style="color:#04060c; font-weight:700; font-size:15px;">Create a Group</span>
    </div>
    <!-- Secondary outline -->
    <div style="border:1px solid var(--c-shore); border-radius:12px; padding:14px 16px; text-align:center;">
      <span style="color:var(--c-fg-2); font-size:15px;">Join with Code</span>
    </div>
    <!-- Ghost -->
    <div style="padding:14px 16px; text-align:center;">
      <span style="color:var(--c-fg-3); font-size:14px;">Already have an account? Log in</span>
    </div>
    <!-- Done action (header) -->
    <div style="display:flex; gap:14px; align-items:center; padding-top:6px;">
      <span style="color:var(--c-fg-3); font-size:16px;">Cancel</span>
      <span style="color:var(--c-fg-4); font-size:14px;">·</span>
      <span style="color:var(--c-glow-cyan); font-size:16px; font-weight:700;">⚡ Go Live</span>
      <span style="color:var(--c-fg-4); font-size:14px;">·</span>
      <span style="color:var(--c-glow-cyan); font-size:16px; font-weight:700;">Create</span>
    </div>
  </div>
</div>
</body></html>
