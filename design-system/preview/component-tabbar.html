<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>

    <div style="flex:1; display:flex; flex-direction:column; align-items:center; gap:3px;">

  <div style="padding:12px 20px; color: var(--c-fg-3); font-size:11px;">Active tab uses cyan icon + cyan label. Inactive uses faint dusk grey.</div>
