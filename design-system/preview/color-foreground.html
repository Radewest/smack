<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card">
  <div class="row" style="gap:14px;">
    <div class="swatch"><div class="swatch-chip" style="background:#f3f5ff; border-color:#ffffff30;"></div><div class="swatch-name">Foreground</div><div class="swatch-hex">#f3f5ff</div><div class="swatch-var">--c-fg</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#b8bedb"></div><div class="swatch-name">FG 2 · secondary</div><div class="swatch-hex">#b8bedb</div><div class="swatch-var">--c-fg-2</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#7a82a5"></div><div class="swatch-name">FG 3 · meta</div><div class="swatch-hex">#7a82a5</div><div class="swatch-var">--c-fg-3</div></div>
    <div class="swatch"><div class="swatch-chip" style="background:#4a5278"></div><div class="swatch-name">FG 4 · faint</div><div class="swatch-hex">#4a5278</div><div class="swatch-var">--c-fg-4</div></div>
  </div>
  <div style="margin-top:18px; padding-top:14px; border-top:1px solid var(--c-shore);">
    <div style="color: var(--c-fg); font-size:15px;">Primary text — soft cool white, never pure white.</div>
    <div style="color: var(--c-fg-2); font-size:14px; margin-top:4px;">Secondary text — for body copy in cards.</div>
    <div style="color: var(--c-fg-3); font-size:13px; margin-top:4px;">Tertiary — meta, labels, locations.</div>
    <div style="color: var(--c-fg-4); font-size:12px; margin-top:4px;">Faint — disabled, deepest hierarchy.</div>
  </div>
</div>
</body></html>
