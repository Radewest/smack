<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card" style="padding:0; background: var(--c-deep-solid);">
  <div style="position:relative; min-height:120px;">
    <!-- Avatar circle initial -->
    <div style="position:absolute; right:18px; bottom:18px;">
      <div style="width:54px; height:54px; border-radius:50%; background:#2ee6d6; box-shadow: 0 4px 8px #2ee6d680, 0 0 24px #2ee6d655; display:flex; align-items:center; justify-content:center;">
        <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="#04060c" stroke-width="2.5" stroke-linecap="round"><path d="M12 5v14M5 12h14"/></svg>
      </div>
    </div>
    <!-- Floating "Free tonight" quick action -->
    <div style="margin: 18px 18px 0 18px; padding:14px; border-radius:14px; background:#0a1a2a; border:1px solid #1a3a4a; display:flex; align-items:center; gap:12px;">
      <span style="font-size:24px;">🙋</span>
      <div>
        <div style="color:var(--c-fg); font-size:15px; font-weight:700;">Free Tonight</div>
        <div style="color:var(--c-fg-3); font-size:12px; margin-top:2px;">Let your group know you're about</div>
      </div>
    </div>
  </div>
</div>
</body></html>
