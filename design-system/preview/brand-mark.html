<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card" style="display:flex; align-items:center; gap:32px;">
  <div style="position:relative; width:160px; height:200px; flex-shrink:0;">
    <img src="../assets/smack-mark.svg" style="width:100%; height:100%; display:block; filter: drop-shadow(0 0 24px #2ee6d655)">
  </div>
  <div style="flex:1; min-width:0;">
    <div style="font-family: var(--f-sans); font-weight:900; font-size:64px; letter-spacing:-2.5px; line-height:1; color: var(--c-fg); text-shadow: 0 0 24px #2ee6d633;">smack</div>
    <div style="margin-top:14px; color: var(--c-fg-3); font-size:13px; max-width: 360px; line-height:1.5;">
      The jellyfish — collective noun: <em>a smack</em>. Single-weight cyan stroke, inner glow, four tentacles fading toward the depths. Wordmark is Geist Black at <code style="font-family:var(--f-mono); color:var(--c-fg-2)">−2.5px</code> tracking.
    </div>
  </div>
</div>
</body></html>
