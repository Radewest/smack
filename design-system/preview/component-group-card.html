<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card" style="padding:18px 20px;">
  <div style="display:flex; flex-direction:column; gap:8px;">
    <!-- Group card 1 -->
    <div style="display:flex; align-items:center; background: var(--c-ink); border:1px solid var(--c-shore); border-radius:16px; padding:14px;">
      <div style="width:48px; height:48px; border-radius:14px; background:#1c2440; display:flex; align-items:center; justify-content:center; margin-right:14px;"><span style="font-size:24px;">🌊</span></div>
      <div style="flex:1; min-width:0;">
        <div style="color:var(--c-fg); font-weight:700; font-size:16px;">The Jellies</div>
        <div style="color:var(--c-fg-3); font-size:13px; margin-top:2px;">8 members  ·  Admin</div>
      </div>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4a5278" stroke-width="2" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg>
    </div>
    <!-- Group card 2 -->
    <div style="display:flex; align-items:center; background: var(--c-ink); border:1px solid var(--c-shore); border-radius:16px; padding:14px;">
      <div style="width:48px; height:48px; border-radius:14px; background:#1c2440; display:flex; align-items:center; justify-content:center; margin-right:14px;"><span style="font-size:24px;">🍻</span></div>
      <div style="flex:1; min-width:0;">
        <div style="color:var(--c-fg); font-weight:700; font-size:16px;">Pub Crew</div>
        <div style="color:var(--c-fg-3); font-size:13px; margin-top:2px;">5 members</div>
      </div>
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="#4a5278" stroke-width="2" stroke-linecap="round"><path d="m9 18 6-6-6-6"/></svg>
    </div>
  </div>
</div>
</body></html>
