<!doctype html>
<html><head><meta charset="utf-8"><link rel="stylesheet" href="_base.css"></head>
<body>
<div class="card" style="padding:18px 20px;">
  <div style="display:flex; flex-direction:column; gap:10px;">
    <div style="background: var(--c-ink); border:1px solid var(--c-shore); border-radius:12px; padding:13px 16px;">
      <span style="color:var(--c-fg-4); font-size:16px;">Email</span>
    </div>
    <div style="background: var(--c-ink); border:1px solid var(--c-glow-cyan); border-radius:12px; padding:13px 16px; box-shadow: 0 0 0 3px #2ee6d622;">
      <span style="color:var(--c-fg); font-size:16px;">tom@thejellies.co</span>
    </div>
    <div style="background: var(--c-ink); border:1px solid var(--c-shore); border-radius:12px; padding:13px 16px;">
      <span style="color:var(--c-fg); font-size:16px;">••••••••</span>
    </div>
    <div style="display:flex; gap:10px;">
      <div style="flex:1; padding:12px; border-radius:10px; background:#0a1f3a; border:1px solid #0a4a8a; text-align:center;"><span style="color:var(--c-fg); font-weight:600; font-size:14px;">📅 Event</span></div>
      <div style="flex:1; padding:12px; border-radius:10px; background:var(--c-ink); border:1px solid var(--c-shore); text-align:center;"><span style="color:var(--c-fg-3); font-weight:600; font-size:14px;">⚡ Live</span></div>
    </div>
  </div>
  <div style="margin-top:12px; color: var(--c-fg-3); font-size:11px;">Default · focus · filled · segmented selector</div>
</div>
</body></html>
